version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: celiapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: celiapp_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://postgres:celiapp_dev@db:5432/celiapp
      SECRET_KEY: dev_secret_key_change_in_production
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      # PERPLEXITY_API_KEY: añade tu key aquí o en .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c 'npm install && npm run dev -- --host'
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  postgres_data:
